# Example profile: 住信SBIネット銀行 — bank statement joined with debit-card detail.
#
# 住信SBI's "入出金明細" CSV (`nyushukinmeisai_*.csv`) shows debit-card purchases
# as opaque `デビット ######` lines. The actual merchant, FX rate, and 海外事務
# 手数料 live in a separate "デビットカード明細" CSV (`meisai_*.csv`). This profile
# joins the two by (date ± window, total amount) and emits a single Transaction
# per statement row, with `splits` filled in for foreign purchases so the FX
# fee lands on its own GnuCash account.
#
# Save to ~/.config/fetchdoc/profiles/sbi-sumishin.toml, drop both CSVs in the
# same directory, then:
#
#   fetchdoc import csv --profile sbi-sumishin --dir ./sbi-2026-05/ > tx.jsonl
#
# Column names match the export as of 2026-05; if SBI tweaks them, update the
# `[columns]` and `[multi.debit.columns]` blocks accordingly.

name = "sbi-sumishin"
encoding = "shift_jis"
delimiter = ","
header_row = 1
date_format = "%Y/%m/%d"

[columns]
posted_date = "日付"
description = "内容"
withdrawal  = "出金金額(円)"
deposit     = "入金金額(円)"
balance     = "残高(円)"
memo        = "メモ"

[multi]
primary_glob        = "nyushukinmeisai_*.csv"
# Only statement rows whose description starts with `デビット` (followed by the
# slip number) are joined against the debit-card detail. Everything else
# (transfers, salary, ATM withdrawals) passes through as a plain transaction.
primary_match_regex = '^デビット'

[multi.debit]
glob        = "meisai_*.csv"
encoding    = "shift_jis"
delimiter   = ","
date_format = "%Y/%m/%d"

# The debit CSV has a leading marker column: header text "1", data-row value "2".
# Filter so any future trailer/summary rows are skipped quietly.
[multi.debit.row_filter]
column = "1"
value  = "2"

[multi.debit.columns]
date         = "お取引日"
merchant     = "お取引内容"
tx_amount    = "お取引金額"
tx_fee       = "お取引手数料"
atm_fee      = "ATM手数料"
fx_fee       = "海外事務手数料"
use_currency = "ご利用通貨"
use_amount   = "ご利用金額"
rate         = "換算レート"

[multi.join]
# Settlement lag between the debit slip date and the bank-posted date is
# usually 1-3 business days. 7 catches the long tail without false matches.
date_window_days = 7
# GnuCash account for the FX handling fee split. Override to taste.
fx_fee_account   = "Expenses:支払手数料:海外事務手数料"
# tx_fee_account  = "Expenses:支払手数料"
# atm_fee_account = "Expenses:支払手数料:ATM手数料"
